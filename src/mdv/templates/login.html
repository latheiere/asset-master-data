<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/favicon.ico" type="image/svg+xml">
  <title>Asset Master Data Login</title>
  <style>
    :root { color-scheme: light dark; font-family: system-ui, sans-serif; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #111827; }
    main { width: min(24rem, calc(100% - 3rem)); padding: 2rem; border-radius: .75rem; background: #1f2937; box-shadow: 0 1rem 3rem #0008; }
    h1 { margin: 0 0 1.5rem; font-size: 1.35rem; }
    label { display: block; margin-top: 1rem; font-size: .9rem; }
    input { box-sizing: border-box; width: 100%; margin-top: .4rem; padding: .7rem; border: 1px solid #64748b; border-radius: .35rem; background: #111827; }
    button { width: 100%; margin-top: 1.5rem; padding: .75rem; border: 0; border-radius: .35rem; background: #2563eb; color: white; font-weight: 650; cursor: pointer; }
    .error { color: #fca5a5; }
  </style>
</head>
<body>
  <main>
    <h1>Asset Master Data</h1>
    {% if error %}<p class="error" role="alert">{{ error }}</p>{% endif %}
    <form method="post" action="/login">
      <input type="hidden" name="next" value="{{ next_path }}">
      <label>Username<input name="username" autocomplete="username" required autofocus></label>
      <label>Password<input type="password" name="password" autocomplete="current-password" required></label>
      <button type="submit">Sign in</button>
    </form>
  </main>
</body>
</html>
