database:
  path: .data/mdv.sqlite3

server:
  host: 127.0.0.1
  port: 8090

collection:
  http_timeout_seconds: 20
  max_concurrent_fetches: 2
  stale_after_seconds: 7200
  # Set 0 to disable collection-age readiness checks.
  readiness_max_age_seconds: 129600
  # systemd OnCalendar syntax. The installer renders this into the timer unit.
  schedule: "*-*-* 00:00:00 UTC"

audit:
  # Unchanged observations older than this are compacted after collection.
  unchanged_observation_retention_days: 30
  # Preserve change hashes/state, but drop bulky historical payloads after this age.
  changed_payload_retention_days: 7
  # Bound retained change rows per observation table; 0 disables the hard cap.
  max_retained_observations_per_table: 100000

auth:
  entitlements_path: config/entitlements.yaml
  session_cookie_name: mdv_session
  session_ttl_seconds: 43200
  max_concurrent_hashes: 2
  failed_attempt_limit: 10
  failed_attempt_window_seconds: 60
  # Set true when HTML is served over HTTPS.
  session_cookie_secure: false

integration:
  token_info_url: http://127.0.0.1:8091
